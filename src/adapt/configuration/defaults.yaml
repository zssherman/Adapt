# Default NEXRAD pipeline module sequence.
# Each entry is a Python module path. Importing the module triggers
# registry.register() for the BaseModule subclass it contains.
# Modules run in dependency order determined by the execution graph —
# add entries here to extend the pipeline without editing Python code.

pipeline:
  modules:
    - adapt.execution.nodes.ingest
    - adapt.execution.nodes.detection
    - adapt.execution.nodes.projection
    - adapt.execution.nodes.analysis
    - adapt.execution.nodes.tracking
